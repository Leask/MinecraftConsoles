name: Native Smoke

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/native-smoke.yml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'COMPILE.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'Portability/**'
      - 'include/**'
      - 'tools/**'
      - 'Minecraft.Server/**'
      - 'Minecraft.World/**'
      - 'Minecraft.Client/**'
      - 'cmake/**'
  push:
    branches:
      - 'main'
    paths:
      - '.github/workflows/native-smoke.yml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'COMPILE.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'Portability/**'
      - 'include/**'
      - 'tools/**'
      - 'Minecraft.Server/**'
      - 'Minecraft.World/**'
      - 'Minecraft.Client/**'
      - 'cmake/**'

jobs:
  smoke:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure_preset: linux-native
            build_preset: linux-native-debug
            test_preset: linux-native-debug-test
          - os: macos-latest
            configure_preset: macos-native
            build_preset: macos-native-debug
            test_preset: macos-native-debug-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake --preset "${{ matrix.configure_preset }}"

      - name: Build native smoke target
        run: >
          cmake --build --preset "${{ matrix.build_preset }}"
          --target Minecraft.Portability.Check

      - name: Run native smoke preset
        run: ctest --preset "${{ matrix.test_preset }}"

  client-smoke:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure_preset: linux-native-client
            build_preset: linux-native-client-debug
            test_preset: linux-native-client-debug-test
          - os: macos-latest
            configure_preset: macos-native-client
            build_preset: macos-native-client-debug
            test_preset: macos-native-client-debug-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake --preset "${{ matrix.configure_preset }}"

      - name: Build native client smoke target
        run: >
          cmake --build --preset "${{ matrix.build_preset }}"
          --target Minecraft.NativeDesktop.Check

      - name: Run native client smoke preset
        run: ctest --preset "${{ matrix.test_preset }}"
